<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Analysis — Coming Soon</title>
  <meta name="description" content="Simple Analysis — Accountancy & Payroll for SMEs. Coming soon." />
  <link rel="icon" type="image/png" href="images/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1a2e6e;
      --teal: #1e7a6e;
      --border: #e2e2e2;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #fff;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .logo {
      height: 80px;
      width: auto;
      margin: 0 auto 48px;
      display: block;
    }

    .eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 16px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 40px;
      line-height: 1.1;
      letter-spacing: -0.8px;
      color: var(--navy);
      font-weight: 400;
      margin-bottom: 20px;
    }

    p {
      font-size: 16px;
      color: #666;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 40px;
    }

    .contact-label {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 10px;
    }

    .contact-link {
      font-size: 15px;
      color: var(--navy);
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    .contact-link:hover {
      color: var(--teal);
      border-color: var(--teal);
    }

    .footer {
      position: fixed;
      bottom: 24px;
      font-size: 12px;
      color: #ccc;
    }
  </style>
</head>
<body>

  <div class="container">
    <img class="logo" src="images/logo.png" alt="Simple Analysis" />
    <p class="eyebrow">Accountancy & Payroll</p>
    <h1>Something good is coming.</h1>
    <p>We're putting the finishing touches on our new website. In the meantime, get in touch — we'd love to hear from you.</p>
    <div class="divider"></div>
    <p class="contact-label">Contact us</p>
    <a class="contact-link" href="mailto:roberto@simpleanalysis.co.uk">roberto@simpleanalysis.co.uk</a>
  </div>

  <p class="footer">© 2026 Simple Analysis. All rights reserved.</p>

</body>
</html>
